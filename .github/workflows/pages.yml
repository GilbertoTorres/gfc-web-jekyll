name: Build and Deploy Jekyll + Tailwind

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Install Node for Tailwind/Webpack build
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: npm run prod   # <-- runs Encore to generate CSS/JS

      # 2. Run the official Jekyll build
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 3. Deploy to GitHub Pages
      - uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
